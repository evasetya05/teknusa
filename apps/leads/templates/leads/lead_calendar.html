{% extends 'dashboard/base.html' %}
{% load static %}

{% block title %}Lead Follow-up Calendar{% endblock %}

{% block extra_css %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<style>
    .fc-event {
        cursor: pointer;
        padding: 2px 4px;
        font-size: 0.85em;
    }
    .calendar-container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    #calendar {
        max-height: 1000px;
    }

    @media (max-width: 992px) {
        .calendar-container {
            padding: 16px;
        }
        .fc .fc-toolbar-chunk {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }
        .fc .fc-toolbar-title {
            width: 100%;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 0.75rem;
        }
        .fc-button {
            padding: 0.45rem 0.8rem;
            font-size: 0.82rem;
        }
    }

    @media (max-width: 768px) {
        .calendar-container {
            padding: 12px;
        }

        #calendar {
            min-height: 500px;
        }

        .fc .fc-toolbar-chunk {
            flex-direction: column;
            align-items: stretch;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Follow-up Calendar</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a href="{% url 'leads:lead_list' %}" class="btn btn-sm btn-outline-secondary">
                <i class="fas fa-list me-1"></i> Kembali ke Daftar
            </a>
        </div>
    </div>

    <div class="calendar-container">
        <div id='calendar'></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var isMobile = window.innerWidth < 768;
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: isMobile ? 'listWeek' : 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: isMobile ? 'listWeek' : 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            views: {
                listWeek: { buttonText: 'List' }
            },
            events: '{% url "leads:lead_calendar_events" %}',
            eventClick: function(info) {
                if (info.event.url) {
                    window.location.href = info.event.url;
                    return false;
                }
            },
            height: 'auto',
            contentHeight: 'auto',
            themeSystem: 'bootstrap5',
            dayMaxEvents: true,
            navLinks: true,
            eventDisplay: 'block'
        });
        calendar.render();

        window.addEventListener('resize', function() {
            var mobileView = window.innerWidth < 768 ? 'listWeek' : 'dayGridMonth';
            if (calendar.view.type !== mobileView) {
                calendar.changeView(mobileView);
            }
        });
    });
</script>
{% endblock %}
