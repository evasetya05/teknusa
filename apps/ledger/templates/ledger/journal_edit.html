{% load static %}
{% load humanize %}

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Edit Jurnal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }

        h2 {
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 6px 8px;
            margin-top: 4px;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table thead {
            background: #f0f2f5;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        table th {
            text-align: center;
        }

        td.number {
            text-align: right;
        }

        .meta {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: #2d7ef7;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1c66d6;
        }

        .posted {
            background: #f9fbff;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #dbe3ff;
        }

        .text-muted {
            color: #777;
            font-size: 13px;
        }
    </style>
</head>

<body>
<div class="container">

    <h2>Edit Jurnal</h2>

    <form method="post">
        {% csrf_token %}

        <div class="meta">
            <div>
                <label>Tanggal</label>
                <input type="date" value="{{ journal.date }}" disabled>
            </div>

            <div>
                <label>Deskripsi</label>
                <input type="text" name="description" value="{{ journal.description }}" required>
            </div>
        </div>

        <p class="text-muted">
            Total baris jurnal: <strong>{{ journal_items|length }}</strong>
        </p>

        <table>
            <thead>
                <tr>
                    <th style="width:25%">Akun</th>
                    <th style="width:15%">Debit</th>
                    <th style="width:15%">Kredit</th>
                    <th>Keterangan</th>
                </tr>
            </thead>
            <tbody>
                {% for item in journal_items %}
                <tr>
                    <td>
                        <select name="account_id[]">
                            {% for acc in accounts %}
                                <option value="{{ acc.id }}"
                                    {% if acc.id == item.account.id %}selected{% endif %}>
                                    {{ acc }}
                                </option>
                            {% endfor %}
                        </select>
                    </td>

                    <td class="number">
                        <input type="number" name="debit[]" value="{{ item.debit }}" step="any">
                    </td>

                    <td class="number">
                        <input type="number" name="credit[]" value="{{ item.credit }}" step="any">
                    </td>

                    <td>
                        <input type="text" name="note[]" value="{{ item.note }}">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="footer">
            <div class="posted">
                <label>
                    <input type="checkbox" name="post" value="1"
                           {% if journal.is_posted %}checked{% endif %}>
                    Tandai sebagai <strong>Posted</strong> ke Ledger
                </label>
            </div>

            <button type="submit" class="btn btn-primary">
                💾 Simpan Perubahan
            </button>
        </div>

    </form>
</div>
</body>
</html>
