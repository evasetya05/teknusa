{% extends "main/layout.html" %}
{% load crispy_forms_tags %}

{% block content %}
<style>
.dashboard-sidebar .nav-link {
    color: #495057;
    padding: 0.75rem 1rem;
    border-radius: 0;
    transition: all 0.2s ease;
}
.dashboard-sidebar .nav-link:hover {
    background-color: #f8f9fa;
    color: #007bff;
}
.dashboard-sidebar .nav-link.active {
    background-color: #007bff;
    color: white;
}
.dashboard-sidebar .nav-link i {
    width: 20px;
    text-align: center;
}
</style>

<div class="container-fluid mt-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 dashboard-sidebar">
            {% include "dashboard/includes/sidebar.html" %}
        </div>

        <!-- Main content -->
        <div class="col-md-9 col-lg-10">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">{% if object %}Edit Board{% else %}Create New Board{% endif %}</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">Save Board</button>
                            <a href="{% url 'kanban:board_list' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
