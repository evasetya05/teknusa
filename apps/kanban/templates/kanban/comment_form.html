{% extends "main/layout.html" %}
{% load static %}

{% block content %}
<h2>Add Comment</h2>
<form method="post">
    {% csrf_token %}
    <input type="hidden" name="task" value="{{ task_id }}">
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
